# ═══════════════════════════════════════════════════════
# ELLAURA — Docker Compose Orchestration
# All services: Frontend, Backend, ML Model, MongoDB
# ═══════════════════════════════════════════════════════
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f        # View logs
#   docker compose ps             # Check status
#
# ═══════════════════════════════════════════════════════

services:

  # ── MongoDB Database ──
  mongodb:
    image: mongo:6
    container_name: ellaura-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ellaura-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ellaura
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ellaura-network

  # ── Backend API Server ──
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ellaura-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ellaura
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-me-to-another-random-secret}
      - JWT_EXPIRE=7d
      - JWT_REFRESH_EXPIRE=30d
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CORS_ORIGIN=http://localhost:3002,http://localhost:5173
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - BACKEND_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost:3002
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - N8N_GROCERY_WEBHOOK=${N8N_GROCERY_WEBHOOK:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - BLINKIT_AFFILIATE_TAG=${BLINKIT_AFFILIATE_TAG:-}
      - AMAZON_AFFILIATE_TAG=${AMAZON_AFFILIATE_TAG:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ellaura-network

  # ── Frontend React App ──
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: ellaura-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - ellaura-network

  # ── ML Model Server (Python) ──
  ml-model:
    build:
      context: ./ml_model
      dockerfile: Dockerfile
    container_name: ellaura-ml-model
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FLASK_ENV=production
    depends_on:
      - backend
    networks:
      - ellaura-network

# ── Volumes ──
volumes:
  ellaura-mongo-data:
    driver: local

# ── Networks ──
networks:
  ellaura-network:
    driver: bridge
